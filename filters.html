<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySpot UQ - Filters</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <h1 class="page-title">StudySpot UQ</h1>

  <main class="app-shell">
    <section class="phone">
      <header class="phone-header">
        <a href="map.html">←</a>
        <span class="phone-title">Filters</span>
        <a href="filters.html">Reset</a>
      </header>

      <div class="phone-content">
        <p class="screen-label">Search and Filter Screen</p>

        <div class="search-bar">Charging ports, quiet space...</div>

        <div class="card">
          <div class="filter-group">
            <p class="filter-title">Amenities</p>
            <div class="checkbox-list">
              <span class="checkbox-pill selected">✓ Charging</span>
              <span class="checkbox-pill">Water</span>
              <span class="checkbox-pill">Microwave</span>
              <span class="checkbox-pill selected">✓ Air con</span>
              <span class="checkbox-pill">Clean space</span>
              <span class="checkbox-pill">Comfort seats</span>
            </div>
          </div>

          <div class="filter-group">
            <p class="filter-title">Environment</p>
            <div class="checkbox-list">
              <span class="checkbox-pill selected">✓ Quiet</span>
              <span class="checkbox-pill">Low light</span>
              <span class="checkbox-pill">Bright</span>
              <span class="checkbox-pill">Cool</span>
              <span class="checkbox-pill">Solo study</span>
              <span class="checkbox-pill">Group study</span>
            </div>
          </div>

          <div class="filter-group">
            <p class="filter-title">Sort Results</p>
            <div class="sort-box">Least busy first ↓</div>
          </div>
        </div>

        <a class="primary-button" href="map.html">Show 12 Matching Spaces</a>
        <a class="secondary-button" href="map.html">Back to Map</a>
      </div>
    </section>
  </main>
</body>
</html>
